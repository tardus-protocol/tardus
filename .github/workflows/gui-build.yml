name: gui-build

# tardus-wallet-gui binary build gate. Heavy build (eframe +
# solana-client + tardus core stack); separate workflow so the
# main workspace-tests gate stays fast.

on:
  push:
    branches: ['**']
    paths:
      - 'crates/tardus-wallet-gui/**'
      - 'crates/tardus-wallet/**'
      - 'crates/tardus-client/**'
      - 'crates/tardus-program/**'
      - '.github/workflows/gui-build.yml'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build tardus-wallet-gui (release)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: install GUI build deps (X11/Wayland headers for eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev \
            libgl1-mesa-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wallet-gui

      - name: cargo build --release -p tardus-wallet-gui
        run: cargo build --release -p tardus-wallet-gui

      - name: cargo test --release -p tardus-wallet-gui
        # Default-features only; the 3 live `#[ignore]` tests need
        # the validator + relay binaries and run in a separate
        # local-stack workflow.
        run: cargo test --release -p tardus-wallet-gui --no-fail-fast
