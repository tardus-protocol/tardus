name: hsm-tests

# PKCS#11 HSM integration tests against softhsm2. These tests are
# `#[ignore]`-gated and need:
#   1. softhsm2 system package
#   2. `--features hsm` (cryptoki dep)
#   3. `--test-threads=1` (token init races otherwise)
#
# Manual-trigger only (workflow_dispatch). Auto-run on demand
# rather than on every push because the install + per-test
# softhsm config is non-trivial.

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 04:00 UTC: regression smoke against latest
    # softhsm + cryptoki.
    - cron: '0 4 * * 0'

jobs:
  hsm:
    name: HSM tests (softhsm2 + --features hsm)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: install softhsm2 + pkcs11-tool
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            softhsm2 \
            opensc \
            libssl-dev
          softhsm2-util --version

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: hsm

      - name: cargo test -p tardus-validator --features hsm
        run: |
          cargo test --release \
            -p tardus-validator --features hsm \
            --test hsm_pkcs11 \
            -- --ignored --test-threads=1 --nocapture
