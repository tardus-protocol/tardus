name: Security Audit

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "ts-sdk/package.json"
      - "ts-sdk/package-lock.json"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "ts-sdk/package.json"
      - "ts-sdk/package-lock.json"
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # for uploading SARIF results

jobs:
  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: cargo deny (licenses + advisories + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny check
        run: cargo deny check

  npm-audit:
    name: npm audit (ts-sdk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ts-sdk/package-lock.json

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  npm-audit-web:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  cargo-clippy-security:
    name: clippy (security lints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show  # uses rust-toolchain.toml

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy with security-relevant lints
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::integer_arithmetic \
            -W clippy::pedantic \
            2>&1 | tee clippy-output.txt
        continue-on-error: true  # report but don't block on pedantic

      - name: Fail on hard security lints
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::transmute_ptr_to_ref \
            -D clippy::mem_forget \
            -D clippy::cast_ptr_alignment