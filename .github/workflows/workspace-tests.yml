name: workspace-tests

# Core Rust workspace gate: build + test + clippy on every push
# to any branch + every PR. Mainnet ship-gate item S2.

on:
  push:
    branches: ['**']
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/workspace-tests.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/workspace-tests.yml'

env:
  CARGO_TERM_COLOR: always
  # **v2.13.3 mainnet-prep tighten**: clippy strict gate is now
  # active workspace-wide. The remaining `too_many_lines` warnings
  # have explicit `#[allow(...)]` annotations at their site (e.g.
  # `tardus-cli/src/main.rs::main`); any NEW warning fails CI.
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    name: build + test (workspace, default features)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'
          components: clippy,rustfmt

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace-wide cache + intermediate target/ shared
          # across the build + test + clippy steps.
          shared-key: workspace

      - name: cargo build --release --workspace
        run: cargo build --release --workspace

      - name: cargo test --workspace --release
        # Default features only (no HSM). HSM gate runs in a
        # separate workflow because it needs `softhsm2` installed
        # and is `#[ignore]`-gated.
        run: cargo test --workspace --release --no-fail-fast

      - name: cargo clippy --workspace --all-targets -- -D warnings
        # **STRICT gate** (active since v2.13.3): any warning fails
        # the build. Per-callsite `#[allow(...)]` annotations exist
        # for the few accepted pedantic exceptions; if you introduce
        # a new clippy warning, either fix it or add a justified
        # `#[allow(...)]` with a short comment explaining why.
        run: cargo clippy --workspace --all-targets -- -D warnings

  clippy-strict:
    name: clippy (--features hsm — wider lint surface)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85'
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-hsm
      - name: cargo clippy --features hsm --all-targets -- -D warnings
        # The `hsm` feature compiles cryptoki but does NOT run the
        # `#[ignore]`-gated HSM integration tests here. Those need
        # the softhsm2 package and a per-test softhsm config; they
        # run in the `hsm-tests` workflow (manual-trigger only).
        run: cargo clippy --workspace --features hsm --all-targets -- -D warnings
