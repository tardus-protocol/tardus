name: spec-build

# TARDUS Protocol Specification PDF build. Spec is the
# authoritative source of truth (50 pages v1.6 currently).
# Mainnet ship-gate item: spec build must succeed with 0 LaTeX
# warnings.

on:
  push:
    branches: ['**']
    paths:
      - 'spec/**'
      - '.github/workflows/spec-build.yml'
  pull_request:
    paths:
      - 'spec/**'

jobs:
  build-pdf:
    name: pdflatex + bibtex (zero-warning gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: install TeX Live (latex-extra + fonts-extra)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-bibtex-extra \
            biber \
            poppler-utils

      - name: build SPEC.pdf
        working-directory: spec
        run: make

      - name: assert zero warnings + undefined references
        working-directory: spec
        run: |
          set -e
          WARNS=$(grep -cE 'Warning|undefined' SPEC.log || true)
          echo "LaTeX warnings: $WARNS"
          if [ "$WARNS" -ne 0 ]; then
            echo "::error::SPEC.pdf has $WARNS LaTeX warning(s) — see SPEC.log"
            grep -E 'Warning|undefined' SPEC.log || true
            exit 1
          fi

      - name: report page count
        working-directory: spec
        run: |
          PAGES=$(pdfinfo SPEC.pdf | awk '/^Pages:/ {print $2}')
          echo "::notice::SPEC.pdf built — ${PAGES} pages"

      - name: upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPEC-${{ github.sha }}.pdf
          path: spec/SPEC.pdf
          retention-days: 90

  easycrypt-syntax:
    name: EasyCrypt skeleton syntax check (.ec files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # EasyCrypt installation is heavy (opam + SMT solvers). For
    # this gate we just verify the files parse with a regex-only
    # check; full type-check is reserved for the Phase 4 audit
    # firm's formal-methods sub-engagement.
    steps:
      - uses: actions/checkout@v4
      - name: structural check of spec/easycrypt/*.ec
        run: |
          set -e
          for f in spec/easycrypt/*.ec; do
            echo "::group::$f"
            # Each file must have at least one `theory` or
            # `require` declaration and at least one `lemma`.
            grep -qE '^(require|theory|module|op|axiom|lemma)' "$f" \
              || (echo "::error file=$f::no top-level decl"; exit 1)
            grep -qE '^lemma ' "$f" \
              || (echo "::error file=$f::no lemma"; exit 1)
            echo "OK"
            echo "::endgroup::"
          done
