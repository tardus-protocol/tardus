name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write  # create GitHub releases and upload assets
  id-token: write  # for sigstore/cosign keyless signing

jobs:
  # ── Validate tag matches workspace version ──────────────────────────────────
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Check Cargo.toml workspace version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          RELEASE_VERSION="${{ steps.get_version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$RELEASE_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag version ($RELEASE_VERSION)"
            exit 1
          fi

  # ── Build CLI binaries ──────────────────────────────────────────────────────
  build-cli:
    name: Build CLI — ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tardus-cli-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tardus-cli-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tardus-cli-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tardus-cli-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tardus-cli-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build CLI
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --package tardus-cli --target ${{ matrix.target }}
          else
            cargo build --release --package tardus-cli --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/tardus"
          strip "$BIN" 2>/dev/null || true
          tar czf "${{ matrix.artifact }}.tar.gz" -C "target/${{ matrix.target }}/release" tardus
          sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target\${{ matrix.target }}\release\tardus.exe" -DestinationPath "${{ matrix.artifact }}.zip"
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii "${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  # ── Build wallet GUI ────────────────────────────────────────────────────────
  build-wallet-gui:
    name: Build Wallet GUI — ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build wallet GUI
        run: cargo build --release --package tardus-wallet-gui

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tardus-wallet-gui-${{ runner.os }}
          path: target/release/tardus-wallet-gui*
          if-no-files-found: ignore

  # ── Sign & create GitHub Release ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, build-cli, build-wallet-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Install cosign (keyless signing)
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts with cosign
        run: |
          find dist/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read f; do
            cosign sign-blob --yes "$f" --bundle "${f}.cosign.bundle"
          done

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tardus v${{ needs.validate.outputs.version }}"
          body_path: release_notes.md
          draft: true  # maintainer reviews before publishing
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256
            dist/**/*.zip
            dist/**/*.zip.sha256
            dist/**/*.cosign.bundle